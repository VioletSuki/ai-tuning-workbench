mode: fixed_binary
display: hex
tx_frame:
  header: "AA"
  tail: "FF"
  message_id: "10"
  checksum: sum_u8
  endian: big
  payload:
    - name: kp
      type: uint16
      wire_scale: 1000
      min: 0
      max: 10000
      default: 1000
      description: Proportional gain (scaled by 1000)
    - name: ki
      type: uint16
      wire_scale: 1000
      min: 0
      max: 10000
      default: 20
      description: Integral gain (scaled by 1000)
    - name: kd
      type: uint16
      wire_scale: 1000
      min: 0
      max: 10000
      default: 10
      description: Derivative gain (scaled by 1000)
    - name: target_speed
      type: int16
      wire_scale: 1
      min: -3000
      max: 3000
      default: 800
      description: Target motor speed
    - name: bt_if_motion_flag
      type: uint8
      wire_scale: 1
      min: 0
      max: 1
      default: 0
      description: Bluetooth motion enable flag
rx_frame:
  header: "AB"
  tail: "FF"
  message_id: "20"
  checksum: sum_u8
  endian: big
  payload:
    - name: time_ms
      type: uint32
      description: Timestamp in milliseconds
    - name: target_speed
      type: int16
      description: Current target speed setpoint
    - name: measured_speed
      type: int16
      description: Measured motor speed
    - name: pwm
      type: int16
      description: PWM output value
    - name: motion_flag
      type: uint8
      description: Motor motion enable flag
