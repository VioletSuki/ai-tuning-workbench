project_name: motor_pid_project
description: "Example project for fast motor PID tuning — uses mock backend for hardware-free verification."
backend:
  type: mock
  mock:
    sample_interval_s: 0.05
    tx_to_rx_map:
      target_speed: target_speed
      bt_if_motion_flag: motion_flag
    response_model:
      target: target_speed
      measured: measured_speed
      output: pwm
      motion_flag: motion_flag
runtime:
  daemon_host: "127.0.0.1"
  daemon_port: 8765
  ring_buffer_seconds: 60
  raw_log_enabled: true
  decoded_log_enabled: true
recording:
  default_run_name: "default_run"
  max_cli_points: 200
  max_cli_raw_frames: 100
windows:
  default_duration_s: 3.0
